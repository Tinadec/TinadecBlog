name: Deploy blog

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack build output
        run: tar -czf tinadec-blog-dist.tar.gz -C dist .

      - name: Upload build output
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          source: tinadec-blog-dist.tar.gz
          target: ${{ secrets.SERVER_UPLOAD_DIR }}
          overwrite: true

      - name: Run server deploy script
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            set -e
            sh "${{ secrets.SERVER_DEPLOY_SCRIPT }}" "${{ secrets.SERVER_UPLOAD_DIR }}/tinadec-blog-dist.tar.gz"
