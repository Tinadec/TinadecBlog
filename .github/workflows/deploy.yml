name: Deploy blog

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SERVER_HOST: ${{ secrets.SERVER_HOST }}
      SERVER_USER: ${{ secrets.SERVER_USER }}
      SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
      SERVER_PORT: ${{ secrets.SERVER_PORT }}
      SERVER_UPLOAD_DIR: ${{ secrets.SERVER_UPLOAD_DIR }}
      SERVER_DEPLOY_SCRIPT: ${{ secrets.SERVER_DEPLOY_SCRIPT }}
      SERVER_WEB_ROOT: ${{ secrets.SERVER_WEB_ROOT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Pack build output
        run: tar -czf tinadec-blog-dist.tar.gz -C dist .

      - name: Prepare server deploy script
        if: ${{ env.SERVER_HOST != '' && env.SERVER_USER != '' && env.SERVER_PASSWORD != '' && env.SERVER_PORT != '' && env.SERVER_UPLOAD_DIR != '' && env.SERVER_DEPLOY_SCRIPT != '' && env.SERVER_WEB_ROOT != '' }}
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_UPLOAD_DIR: ${{ env.SERVER_UPLOAD_DIR }}
          SERVER_DEPLOY_SCRIPT: ${{ env.SERVER_DEPLOY_SCRIPT }}
          SERVER_WEB_ROOT: ${{ env.SERVER_WEB_ROOT }}
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT }}
          envs: SERVER_UPLOAD_DIR,SERVER_DEPLOY_SCRIPT,SERVER_WEB_ROOT
          script: |
            set -e
            mkdir -p "$SERVER_UPLOAD_DIR" "$(dirname "$SERVER_DEPLOY_SCRIPT")" "$SERVER_WEB_ROOT"
            cat > "$SERVER_DEPLOY_SCRIPT" <<'SH'
            #!/usr/bin/env bash
            set -e

            ARCHIVE="$1"
            WEB_ROOT="${SERVER_WEB_ROOT:?SERVER_WEB_ROOT is required}"
            TMP_DIR="$(mktemp -d)"

            trap 'rm -rf "$TMP_DIR"' EXIT

            tar -xzf "$ARCHIVE" -C "$TMP_DIR"

            if command -v rsync >/dev/null 2>&1; then
              rsync -a --delete "$TMP_DIR"/ "$WEB_ROOT"/
            else
              find "$WEB_ROOT" -mindepth 1 -maxdepth 1 -exec rm -rf {} +
              cp -a "$TMP_DIR"/. "$WEB_ROOT"/
            fi
            SH
            chmod +x "$SERVER_DEPLOY_SCRIPT"

      - name: Upload build output
        if: ${{ env.SERVER_HOST != '' && env.SERVER_USER != '' && env.SERVER_PASSWORD != '' && env.SERVER_PORT != '' && env.SERVER_UPLOAD_DIR != '' }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT }}
          source: tinadec-blog-dist.tar.gz
          target: ${{ env.SERVER_UPLOAD_DIR }}
          overwrite: true

      - name: Run server deploy script
        if: ${{ env.SERVER_HOST != '' && env.SERVER_USER != '' && env.SERVER_PASSWORD != '' && env.SERVER_PORT != '' && env.SERVER_UPLOAD_DIR != '' && env.SERVER_DEPLOY_SCRIPT != '' && env.SERVER_WEB_ROOT != '' }}
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_UPLOAD_DIR: ${{ env.SERVER_UPLOAD_DIR }}
          SERVER_DEPLOY_SCRIPT: ${{ env.SERVER_DEPLOY_SCRIPT }}
          SERVER_WEB_ROOT: ${{ env.SERVER_WEB_ROOT }}
        with:
          host: ${{ env.SERVER_HOST }}
          username: ${{ env.SERVER_USER }}
          password: ${{ env.SERVER_PASSWORD }}
          port: ${{ env.SERVER_PORT }}
          envs: SERVER_UPLOAD_DIR,SERVER_DEPLOY_SCRIPT,SERVER_WEB_ROOT
          script: |
            set -e
            sh "$SERVER_DEPLOY_SCRIPT" "$SERVER_UPLOAD_DIR/tinadec-blog-dist.tar.gz"
